# Skardi deployment for Sealos (direct kubectl apply — no template engine)
#
# Before applying, fill in:
#   IMAGE_TAG          — Skardi server image tag, e.g. 0.1.1
#   YOUR_NAMESPACE     — your Sealos namespace, e.g. ns-bg7m761t
#   YOUR_SUBDOMAIN     — the subdomain you enabled in the Sealos dashboard, e.g. skardi-abc123
#   SEALOS_CLOUD_DOMAIN — infer from existing ingress: kubectl get ingress -n <ns> -o jsonpath='{.items[0].spec.rules[0].host}' | cut -d. -f2-
#
# TLS secret is always wildcard-cert on usw-1.
# Subdomain must use *.usw-1.sealos.app (not *.usw-1.sealos.io).
#
# Apply:
#   KUBECONFIG=~/.kube/sealos-config.yaml kubectl apply -f skardi-deploy.yaml

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: skardi-ctx
  namespace: <YOUR_NAMESPACE>
  labels:
    app: skardi
data:
  ctx.yaml: |
    data_sources:
      - name: "products"
        type: "csv"
        path: "/data/products.csv"
        options:
          has_header: true
          delimiter: ","
          schema_infer_max_records: 1000
        description: "Product catalog dataset bundled with the Sealos demo template"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: skardi-pipeline
  namespace: <YOUR_NAMESPACE>
  labels:
    app: skardi
data:
  pipeline.yaml: |
    metadata:
      name: product-search-demo
      version: 1.0.0
      description: Demonstrates SQL serving pipeline for product search and filtering
      author: Skardi Demo
      created_at: 2025-01-15T00:00:00.000+00:00
      updated_at: 2025-01-15T00:00:00.000+00:00

    query: |
      SELECT
        "Index"        AS product_id,
        "Name"         AS product_name,
        "Description"  AS description,
        "Brand"        AS brand,
        "Category"     AS category,
        "Price"        AS price,
        "Currency"     AS currency,
        "Stock"        AS stock_quantity,
        "Color"        AS color,
        "Size"         AS size,
        "Availability" AS availability_status
      FROM products
      WHERE 1=1
        AND ({brand}        IS NULL OR "Brand"        = {brand})
        AND ({max_price}    IS NULL OR "Price"        < {max_price})
        AND ({min_price}    IS NULL OR "Price"        >= {min_price})
        AND ({color}        IS NULL OR "Color"        = {color})
        AND ({category}     IS NULL OR "Category"     = {category})
        AND ({availability} IS NULL OR "Availability" = {availability})
      ORDER BY "Price" ASC
      LIMIT {limit}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: skardi-options-pipeline
  namespace: <YOUR_NAMESPACE>
  labels:
    app: skardi
data:
  options-pipeline.yaml: |
    metadata:
      name: product-options
      version: 1.0.0
      description: Returns distinct categories and availability values for filter dropdowns
      author: Skardi Demo
      created_at: 2025-01-15T00:00:00.000+00:00
      updated_at: 2025-01-15T00:00:00.000+00:00

    query: |
      SELECT
        'category'     AS field,
        "Category"     AS value
      FROM products
      GROUP BY "Category"
      UNION ALL
      SELECT
        'availability' AS field,
        "Availability" AS value
      FROM products
      GROUP BY "Availability"
      ORDER BY field, value

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: skardi-data
  namespace: <YOUR_NAMESPACE>
  labels:
    app: skardi
data:
  products.csv: |
    Index,Name,Description,Brand,Category,Price,Currency,Stock,Color,Size,Availability
    1,Skardi Tee,"Soft cotton t-shirt for daily wear",Skardi,Apparel,29.9,USD,42,Black,M,In Stock
    2,Skardi Bottle,"Insulated steel bottle for work and travel",Skardi,Gear,19.5,USD,18,Silver,750ml,In Stock
    3,DataFusion Mug,"Ceramic mug for coffee and coding",Skardi,Accessories,12.0,USD,0,White,350ml,Out of Stock
    4,Rust Notebook,"Hardcover notebook for architecture sketches",Skardi,Stationery,15.0,USD,8,Orange,A5,In Stock
    5,Skardi Desk Mat,"Large microfiber desk mat for keyboard and mouse",Skardi,Electronics,34.9,USD,25,Gray,XL,In Stock

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skardi
  namespace: <YOUR_NAMESPACE>
  annotations:
    originImageName: ghcr.io/skardilabs/skardi/skardi-server:<IMAGE_TAG>
    deploy.cloud.sealos.io/minReplicas: '1'
    deploy.cloud.sealos.io/maxReplicas: '1'
  labels:
    app: skardi
    cloud.sealos.io/app-deploy-manager: skardi
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: skardi
  template:
    metadata:
      labels:
        app: skardi
    spec:
      automountServiceAccountToken: false
      containers:
        - name: skardi
          image: ghcr.io/skardilabs/skardi/skardi-server:<IMAGE_TAG>
          imagePullPolicy: Always
          args:
            - --ctx
            - /config/ctx.yaml
            - --pipeline
            - /config/pipelines/
            - --port
            - "8080"
          env:
            - name: RUST_LOG
              value: info
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 20m
              memory: 25Mi
            limits:
              cpu: 200m
              memory: 256Mi
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: vn-config-ctx-yaml
              mountPath: /config/ctx.yaml
              subPath: ctx.yaml
              readOnly: true
            - name: vn-config-pipeline-yaml
              mountPath: /config/pipelines/pipeline.yaml
              subPath: pipeline.yaml
              readOnly: true
            - name: vn-config-options-pipeline-yaml
              mountPath: /config/pipelines/options-pipeline.yaml
              subPath: options-pipeline.yaml
              readOnly: true
            - name: vn-data-products-csv
              mountPath: /data/products.csv
              subPath: products.csv
              readOnly: true
      volumes:
        - name: vn-config-ctx-yaml
          configMap:
            name: skardi-ctx
        - name: vn-config-pipeline-yaml
          configMap:
            name: skardi-pipeline
        - name: vn-config-options-pipeline-yaml
          configMap:
            name: skardi-options-pipeline
        - name: vn-data-products-csv
          configMap:
            name: skardi-data

---
apiVersion: v1
kind: Service
metadata:
  name: skardi
  namespace: <YOUR_NAMESPACE>
  labels:
    app: skardi
    cloud.sealos.io/app-deploy-manager: skardi
spec:
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  selector:
    app: skardi

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: skardi
  namespace: <YOUR_NAMESPACE>
  labels:
    app: skardi
    cloud.sealos.io/app-deploy-manager: skardi
    cloud.sealos.io/app-deploy-manager-domain: <YOUR_SUBDOMAIN>
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
    nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
    nginx.ingress.kubernetes.io/server-snippet: |
      client_header_buffer_size 64k;
      large_client_header_buffers 4 128k;
spec:
  ingressClassName: nginx
  rules:
    - host: <YOUR_SUBDOMAIN>.<SEALOS_CLOUD_DOMAIN>
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: skardi
                port:
                  number: 8080
  tls:
    - hosts:
        - <YOUR_SUBDOMAIN>.<SEALOS_CLOUD_DOMAIN>
      secretName: wildcard-cert
