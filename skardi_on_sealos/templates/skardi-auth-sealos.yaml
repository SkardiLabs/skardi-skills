# Generic Skardi deployment on Sealos with auth + SQLite + pipelines
#
# Placeholders to fill before applying:
#   <YOUR_NAMESPACE>      — e.g. ns-bg7m761t
#   <IMAGE_TAG>           — Skardi server image tag, e.g. 0.1.1
#   <YOUR_SUBDOMAIN>      — subdomain enabled in Sealos dashboard
#   <SEALOS_CLOUD_DOMAIN> — infer from existing ingress:
#                           kubectl get ingress -n <ns> -o jsonpath='{.items[0].spec.rules[0].host}' | cut -d. -f2-
#
# Auth secret — create this first:
#   kubectl create secret generic skardi-auth-secret \
#     --from-literal=AUTH_SECRET='<your-32+-char-secret>' \
#     -n <YOUR_NAMESPACE>
#
# Apply:
#   kubectl apply -f skardi-auth-sealos.yaml -n <YOUR_NAMESPACE>

---
# ── Persistent storage for SQLite databases ──────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: skardi-data
  namespace: <YOUR_NAMESPACE>
  labels:
    app: skardi
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi

---
# ── Context: data sources ─────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: skardi-ctx
  namespace: <YOUR_NAMESPACE>
  labels:
    app: skardi
data:
  ctx.yaml: |
    data_sources:
      - name: "items"
        type: "sqlite"
        access_mode: "read_write"
        path: "/data/app.db"
        description: "Items table"
        options:
          table: "items"

      # Add more tables here — one entry per table, same file path is fine
      # - name: "tags"
      #   type: "sqlite"
      #   access_mode: "read_write"
      #   path: "/data/app.db"
      #   options:
      #     table: "tags"

---
# ── Pipelines ─────────────────────────────────────────────────────────────────
# One data key per pipeline file. Mounted as a directory — Skardi loads all .yaml files.
apiVersion: v1
kind: ConfigMap
metadata:
  name: skardi-pipelines
  namespace: <YOUR_NAMESPACE>
  labels:
    app: skardi
data:
  get-items.yaml: |
    metadata:
      name: get-items
      version: 1.0.0
      description: Get items for the authenticated user.
    query: |
      SELECT id, user_id, title, created_at
      FROM items
      WHERE user_id = {user_id}
      ORDER BY created_at DESC

  # Add more pipeline files here as additional data keys

---
# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skardi
  namespace: <YOUR_NAMESPACE>
  labels:
    app: skardi
    cloud.sealos.io/app-deploy-manager: skardi
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: skardi
  template:
    metadata:
      labels:
        app: skardi
    spec:
      automountServiceAccountToken: false
      # Init container creates the SQLite schema the first time the PVC is empty
      initContainers:
        - name: db-init
          image: python:3.12-slim
          command:
            - python3
            - -c
            - |
              import sqlite3
              conn = sqlite3.connect('/data/app.db')
              conn.executescript("""
              CREATE TABLE IF NOT EXISTS items (
                  id         INTEGER PRIMARY KEY AUTOINCREMENT,
                  user_id    TEXT NOT NULL,
                  title      TEXT NOT NULL,
                  created_at TEXT NOT NULL
              );
              """)
              conn.commit()
              conn.close()
              print('DB ready')
          volumeMounts:
            - name: data
              mountPath: /data
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      containers:
        - name: skardi
          image: ghcr.io/skardilabs/skardi/skardi-server:<IMAGE_TAG>
          imagePullPolicy: Always
          args:
            - --ctx
            - /config/ctx.yaml
            - --pipeline
            - /config/pipelines/
            - --port
            - "8080"
          env:
            - name: RUST_LOG
              value: info
            - name: AUTH_MODE
              value: BETTER_AUTH_DIESEL_SQLITE
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: skardi-auth-secret
                  key: AUTH_SECRET
            - name: AUTH_DB_PATH
              value: /data/skardi_auth.db
            - name: AUTH_BASE_URL
              value: https://<YOUR_SUBDOMAIN>.<SEALOS_CLOUD_DOMAIN>
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 6
          volumeMounts:
            - name: data
              mountPath: /data
            - name: ctx
              mountPath: /config/ctx.yaml
              subPath: ctx.yaml
              readOnly: true
            - name: pipelines
              mountPath: /config/pipelines
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: skardi-data
        - name: ctx
          configMap:
            name: skardi-ctx
        - name: pipelines
          configMap:
            name: skardi-pipelines

---
# ── Service ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: skardi
  namespace: <YOUR_NAMESPACE>
  labels:
    app: skardi
spec:
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  selector:
    app: skardi

---
# ── Ingress ───────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: skardi
  namespace: <YOUR_NAMESPACE>
  labels:
    app: skardi
    cloud.sealos.io/app-deploy-manager: skardi
    cloud.sealos.io/app-deploy-manager-domain: <YOUR_SUBDOMAIN>
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
spec:
  ingressClassName: nginx
  rules:
    - host: <YOUR_SUBDOMAIN>.<SEALOS_CLOUD_DOMAIN>
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: skardi
                port:
                  number: 8080
  tls:
    - hosts:
        - <YOUR_SUBDOMAIN>.<SEALOS_CLOUD_DOMAIN>
      secretName: wildcard-cert
